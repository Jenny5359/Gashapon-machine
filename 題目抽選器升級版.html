<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記憶型題目扭蛋機</title>
    <style>
        :root {
            --primary: #ff7675;
            --secondary: #74b9ff;
            --accent: #55efc4;
            --text: #2d3436;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #dfe6e9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            text-align: center;
        }

        .status-tag {
            font-size: 0.8rem;
            background: #eee;
            padding: 4px 12px;
            border-radius: 20px;
            color: #636e72;
            margin-bottom: 10px;
            display: inline-block;
        }

        #result-box {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--text);
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid var(--secondary);
            border-radius: 15px;
            margin: 20px 0;
            background: #f9f9f9;
            padding: 15px;
        }

        .controls button {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: var(--primary);
            color: white;
            transition: 0.2s;
            box-shadow: 0 5px 0 #d63031;
        }

        .controls button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #d63031;
        }

        .controls button:disabled {
            background: #b2bec3;
            box-shadow: none;
            transform: none;
        }

        .admin-section {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
            text-align: left;
        }

        .admin-section h3 { font-size: 1rem; color: #636e72; display: flex; justify-content: space-between; align-items: center; }

        .input-group {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .add-btn {
            background: var(--accent);
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .topic-list {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 8px;
        }

        .topic-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
            align-items: center;
        }

        .topic-item.used {
            text-decoration: line-through;
            color: #b2bec3;
            background: #fafafa;
        }

        .del-btn { color: #ff7675; cursor: pointer; border: none; background: none; font-size: 1.2rem; }

        .shake { animation: shake 0.5s ease-in-out infinite; }
        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(3deg); }
            75% { transform: rotate(-3deg); }
            100% { transform: rotate(0deg); }
        }
        
        .clear-storage {
            font-size: 0.7rem;
            color: #b2bec3;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="status-tag" id="status">載入中...</div>
    <h2 style="margin:0 0 10px 0;">🎮 記憶型扭蛋機</h2>
    
    <div id="result-box">準備開始！</div>

    <div class="controls">
        <button id="draw-btn" onclick="startDraw()">抽一個題目</button>
        <button id="reset-btn" onclick="resetPool()" style="background: #636e72; box-shadow: 0 5px 0 #2d3436; margin-top: 10px
