<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雞尾酒派對專用抽題機</title>
    <style>
        :root {
            --primary: #ff7675;
            --secondary: #74b9ff;
            --accent: #55efc4;
            --text: #2d3436;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #dfe6e9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            text-align: center;
        }

        .status-tag {
            font-size: 0.8rem;
            background: #eee;
            padding: 4px 12px;
            border-radius: 20px;
            color: #636e72;
            margin-bottom: 10px;
            display: inline-block;
        }

        #result-box {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--text);
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid var(--secondary);
            border-radius: 15px;
            margin: 20px 0;
            background: #f9f9f9;
            padding: 15px;
        }

        .controls button {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: var(--primary);
            color: white;
            transition: 0.2s;
            box-shadow: 0 5px 0 #d63031;
        }

        .controls button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #d63031;
        }

        .controls button:disabled {
            background: #b2bec3;
            box-shadow: none;
            transform: none;
        }

        .admin-section {
            margin-top: 30px;
            border-top: 2px dashed #eee;
            padding-top: 20px;
            text-align: left;
        }

        .admin-section h3 { font-size: 1rem; color: #636e72; display: flex; justify-content: space-between; align-items: center; }

        .input-group {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .add-btn {
            background: var(--accent);
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .topic-list {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 8px;
        }

        .topic-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
            align-items: center;
        }

        .topic-item.used {
            text-decoration: line-through;
            color: #b2bec3;
            background: #fafafa;
        }

        .del-btn { color: #ff7675; cursor: pointer; border: none; background: none; font-size: 1.2rem; }

        .shake { animation: shake 0.5s ease-in-out infinite; }
        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(3deg); }
            75% { transform: rotate(-3deg); }
            100% { transform: rotate(0deg); }
        }
        
        .clear-storage {
            font-size: 0.7rem;
            color: #b2bec3;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="status-tag" id="status">載入中...</div>
    <h2 style="margin:0 0 10px 0;">🎨 這畫有聲音 🖌️</h2>
    
    <div id="result-box">Ready...Go!</div>

    <div class="controls">
        <button id="draw-btn" onclick="startDraw()">點我抽題</button>
        <button id="reset-btn" onclick="resetPool()" style="background: #636e72; box-shadow: 0 5px 0 #2d3436; margin-top: 10px; font-size: 0.9rem; padding: 8px;">重置抽選池</button>
    </div>

    <!-- 管理後台：預設隱藏 -->
    <div class="admin-section" id="admin-panel" style="display: none;">
        <h3>
            📝 題目管理 
            <span class="clear-storage" onclick="hardReset()">清空所有存檔</span>
        </h3>
        <div class="input-group">
            <input type="text" id="new-topic" placeholder="新增題目...">
            <button class="add-btn" id="add-btn">新增</button>
        </div>
        <ul class="topic-list" id="topic-list-ui"></ul>
    </div>

    <!-- 底部隱藏開關 -->
    <div style="margin-top: 40px; opacity: 0.2;">
        <span onclick="toggleAdmin()" style="cursor: pointer; font-size: 12px; color: #888;">⚙️ 系統設定</span>
    </div>
</div>

<script>
    // --- 系統開關功能 ---
    function toggleAdmin() {
        const panel = document.getElementById('admin-panel');
        
        if (panel.style.display === 'none') {
            const password = prompt("請輸入管理員密碼：");
            if (password === "CDC") { 
                panel.style.display = 'block';
                window.scrollTo({
                    top: document.body.scrollHeight,
                    behavior: 'smooth'
                });
            } else if (password !== null) {
                alert("密碼錯誤！");
            }
        } else {
            panel.style.display = 'none';
        }
    }

    // --- 核心邏輯功能 ---
    const defaultTopics = ["楊丞琳－曖昧", "楊丞琳－雨愛", "韋禮安－還是會", "潘瑋柏張韶涵－快樂崇拜", "阿妹－三天三夜", "周杰倫－陽光宅男", "張惠妹－聽海",
  "草東沒有派對－山海",
  "光良－童話",
  "吳宗憲＆溫嵐－屋頂",
  "八三夭－東區",
  "五月天－派對動物",
  "蔡依林－玫瑰少年",
  "林俊傑－修練愛情",
  "周杰倫－七里香",
  "林俊傑－小酒窩"];

    let allTopics = JSON.parse(localStorage.getItem('gacha_allTopics')) || [...defaultTopics];
    let pool = JSON.parse(localStorage.getItem('gacha_pool'));
    
    if (!pool) {
        pool = [...allTopics];
    }

    function saveData() {
        localStorage.setItem('gacha_allTopics', JSON.stringify(allTopics));
        localStorage.setItem('gacha_pool', JSON.stringify(pool));
    }

    function updateUI() {
        const listUI = document.getElementById('topic-list-ui');
        const status = document.getElementById('status');
        const drawBtn = document.getElementById('draw-btn');
        
        status.innerText = `剩餘可用：${pool.length} / 總數：${allTopics.length}`;
        
        listUI.innerHTML = '';
        allTopics.forEach((t, index) => {
            const isUsed = !pool.includes(t);
            listUI.innerHTML += `
                <li class="topic-item ${isUsed ? 'used' : ''}">
                    <span>${t}</span>
                    <button class="del-btn" onclick="deleteTopic(${index})">×</button>
                </li>
            `;
        });

        drawBtn.disabled = (pool.length === 0);
        saveData();
    }

    document.getElementById('add-btn').addEventListener('click', function() {
        const input = document.getElementById('new-topic');
        const val = input.value.trim();
        if (val) {
            allTopics.push(val);
            pool.push(val);
            input.value = '';
            updateUI();
        }
    });

    function deleteTopic(index) {
        const target = allTopics[index];
        allTopics.splice(index, 1);
        const poolIndex = pool.indexOf(target);
        if (poolIndex > -1) pool.splice(poolIndex, 1);
        updateUI();
    }

    function startDraw() {
        if (pool.length === 0) return;
        const btn = document.getElementById('draw-btn');
        const resBox = document.getElementById('result-box');
        
        btn.disabled = true;
        resBox.innerText = "抽選中...";
        resBox.classList.add('shake');

        setTimeout(() => {
            resBox.classList.remove('shake');
            const randomIndex = Math.floor(Math.random() * pool.length);
            const picked = pool.splice(randomIndex, 1)[0];
            resBox.innerText = picked;
            btn.disabled = false;
            updateUI();
        }, 800);
    }

    function resetPool() {
        pool = [...allTopics];
        document.getElementById('result-box').innerText = "Ready...Go！";
        updateUI();
    }

    function hardReset() {
        if(confirm("確定要清空新增選項並恢復預設題目嗎？")) {
            localStorage.clear();
            allTopics = [...defaultTopics];
            pool = [...allTopics];
            document.getElementById('result-box').innerText = "已恢復初始設定";
            updateUI();
        }
    }

    updateUI();
</script>

</body>
</html>
